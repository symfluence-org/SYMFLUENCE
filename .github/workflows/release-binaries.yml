name: Release Binaries

on:
  # Trigger on v* tag pushes (not example-data or other tags)
  push:
    tags:
      - 'v[0-9]*'
  # Weekly rebuild to keep binaries fresh (Sundays at 04:00 UTC)
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.7.0). Leave empty to rebuild latest release.'
        required: false
        type: string

defaults:
  run:
    shell: bash -l {0}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false  # Don't cancel releases

permissions:
  contents: write  # Required for creating/updating releases

jobs:
  build-and-release:
    name: Build & Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
            python-version: '3.11'
          - os: macos-latest  # ARM Mac (M1/M2)
            platform: macos-arm64
            python-version: '3.11'
          - os: windows-latest
            platform: windows-x86_64
            python-version: '3.11'

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    env:
      SYMFLUENCE_CODE: ${{ github.workspace }}
      SYMFLUENCE_DATA: ${{ github.workspace }}/symfluence_data
      SYMFLUENCE_DATA_DIR: ${{ github.workspace }}/symfluence_data

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ========================================================================
      # Pre-Release Validation
      # ========================================================================
      - name: Validate version synchronization
        run: |
          echo "Checking that pyproject.toml and tools/npm/package.json versions match..."
          chmod +x scripts/check_version_sync.sh
          ./scripts/check_version_sync.sh

      # ========================================================================
      # Linux System Dependencies
      # ========================================================================
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gfortran cmake \
            openmpi-bin libopenmpi-dev \
            gdal-bin libgdal-dev \
            libnetcdf-dev libnetcdff-dev \
            libhdf5-dev libudunits2-dev \
            libopenblas-dev liblapack-dev \
            patchelf \
            tcl-dev libxml2-utils libexpat1-dev

      - name: Configure compiler env (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "CC=mpicc" >> $GITHUB_ENV
          echo "CXX=mpicxx" >> $GITHUB_ENV
          echo "FC=gfortran" >> $GITHUB_ENV

      # ========================================================================
      # macOS System Dependencies
      # ========================================================================
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc cmake open-mpi netcdf netcdf-fortran hdf5 gdal udunits m4 libxml2 flex cpanminus

          # flex needs gm4 (GNU m4) but macOS Sequoia removed /usr/bin/gm4.
          # Homebrew flex uses the correct path; ensure it's found first.
          echo "/opt/homebrew/opt/flex/bin" >> $GITHUB_PATH

          # CLM/CESM needs Perl XML::LibXML for namelist generation
          cpanm --notest XML::LibXML 2>/dev/null || true

          # Set up Fortran compiler paths
          GCC_VER=$(ls /opt/homebrew/bin/gfortran-* 2>/dev/null | sort -t- -k2 -n | tail -1 | sed 's/.*gfortran-//')
          if [ -n "$GCC_VER" ]; then
            echo "FC=/opt/homebrew/bin/gfortran-${GCC_VER}" >> $GITHUB_ENV
            echo "CC=/opt/homebrew/bin/gcc-${GCC_VER}" >> $GITHUB_ENV
            echo "CXX=/opt/homebrew/bin/g++-${GCC_VER}" >> $GITHUB_ENV
            echo "/opt/homebrew/bin" >> $GITHUB_PATH

            # Create unversioned gfortran symlink — Homebrew only installs
            # versioned binaries (gfortran-13, etc.); the dependency checker
            # looks for plain 'gfortran' via shutil.which().
            ln -sf /opt/homebrew/bin/gfortran-${GCC_VER} /opt/homebrew/bin/gfortran
          fi

          # Help CMake find Homebrew packages (especially udunits)
          echo "CMAKE_PREFIX_PATH=/opt/homebrew" >> $GITHUB_ENV
          echo "UDUNITS2_ROOT=/opt/homebrew" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV

      # ========================================================================
      # Windows System Dependencies
      # ========================================================================
      - name: Set up Miniconda (Windows)
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          channels: conda-forge
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # Core build dependencies
          conda install -y gcc gfortran cmake make netcdf-fortran hdf5 openblas udunits2 numpy gdal boost-cpp proj

          # Expose CONDA_PREFIX so symfluence dependency checker finds conda-installed libs
          echo "CONDA_PREFIX=$CONDA_PREFIX" >> $GITHUB_ENV

          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV
          echo "FC=gfortran" >> $GITHUB_ENV
          echo "SYMFLUENCE_NO_VENV=true" >> $GITHUB_ENV
          echo "SYMFLUENCE_PYTHON=python" >> $GITHUB_ENV

      - name: Install MS-MPI (Windows)
        if: runner.os == 'Windows'
        uses: mpi4py/setup-mpi@v1
        with:
          mpi: msmpi

      # ========================================================================
      # Build Tools
      # ========================================================================
      - name: Free up disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Build external tools
        run: |
          mkdir -p "${{ env.SYMFLUENCE_DATA }}"

          # Ensure we use Python from setup-python action (or conda on Windows)
          if [ "${{ runner.os }}" = "Windows" ]; then
            PYTHON_CMD="${SYMFLUENCE_PYTHON:-python}"
          elif [ -n "$Python3_ROOT_DIR" ]; then
            export PATH="$Python3_ROOT_DIR/bin:$PATH"
            echo "Prepended Python3_ROOT_DIR to PATH: $Python3_ROOT_DIR/bin"
            PYTHON_CMD="python3"
          elif [ -n "$pythonLocation" ]; then
            export PATH="$pythonLocation/bin:$PATH"
            echo "Prepended pythonLocation to PATH: $pythonLocation/bin"
            PYTHON_CMD="python3"
          else
            PYTHON_CMD="python3"
          fi

          # Verify we're using the correct Python
          echo "Python location: $(which $PYTHON_CMD)"
          echo "Python version: $($PYTHON_CMD --version)"

          # Install GDAL Python bindings (needed when gdal-config is available)
          # Skip on Windows — conda's gdal-config is a batch file, not bash-compatible
          if [ "${{ runner.os }}" != "Windows" ] && command -v gdal-config >/dev/null 2>&1; then
            echo "Installing GDAL Python bindings..."
            GDAL_VERSION=$(gdal-config --version)
            # Use strict version range to match system libgdal precisely
            # e.g., if 3.12.0, allow 3.12.0.post1 but NOT 3.12.1
            "$PYTHON_CMD" -m pip install "gdal>=${GDAL_VERSION},<${GDAL_VERSION%.*}.$((${GDAL_VERSION##*.}+1))"
          fi

          # Install SYMFLUENCE package
          "$PYTHON_CMD" -m pip install -e .

          # Build default external tools using symfluence command
          echo "Running: symfluence binary install"
          ./scripts/symfluence-bootstrap binary install

          echo "Default tools build completed"

          # Install experimental models for release
          RELEASE_EXTRAS="vic swat prms mhm crhm wrfhydro watflood modflow parflow clmparflow pihm gsflow clm rhessys wmfire"
          for tool in $RELEASE_EXTRAS; do
            echo "::group::Installing $tool"
            "$PYTHON_CMD" -m symfluence binary install "$tool" || echo "WARNING: $tool install failed (non-fatal)"
            echo "::endgroup::"
          done

          echo "Build external tools completed successfully"

          # Debug: Verify installation directory
          echo "Verifying installation directory:"
          ls -la "${{ env.SYMFLUENCE_DATA }}" || echo "SYMFLUENCE_DATA not found"
          ls -la "${{ env.SYMFLUENCE_DATA }}/installs" || echo "installs directory not found"

      # ========================================================================
      # Generate Release Artifacts
      # ========================================================================
      - name: Generate toolchain metadata
        run: |
          set -e
          chmod +x ./scripts/generate_toolchain.sh
          ./scripts/generate_toolchain.sh \
            "${{ env.SYMFLUENCE_DATA }}/installs" \
            "${{ env.SYMFLUENCE_DATA }}/installs/toolchain.json" \
            "${{ matrix.platform }}"

      - name: Stage release artifacts
        run: |
          set -e
          chmod +x ./scripts/stage_release_artifacts.sh
          mkdir -p ./release
          ./scripts/stage_release_artifacts.sh \
            "${{ matrix.platform }}" \
            "${{ env.SYMFLUENCE_DATA }}/installs" \
            "./release"

      - name: Verify binary portability
        run: |
          set -e
          chmod +x ./scripts/verify_binary_portability.sh
          ./scripts/verify_binary_portability.sh \
            "./release/symfluence-tools/bin" || {
            echo "⚠️  Portability verification had warnings but continuing..."
            echo "   Review the output above for potential issues"
          }

      - name: Create release tarball
        run: |
          set -e
          chmod +x ./scripts/create_release_tarball.sh

          # Get version from tag, manual input, or latest git tag
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref_name }}" == v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          fi

          ./scripts/create_release_tarball.sh \
            "$VERSION" \
            "${{ matrix.platform }}" \
            "./release/symfluence-tools" \
            "./release"

      - name: Test artifact relocatability
        run: |
          set -e
          echo "Testing relocated binaries..."

          # Extract to temporary location
          TEST_DIR="${RUNNER_TEMP:-/tmp}/symfluence-test"
          mkdir -p "$TEST_DIR"
          cd "$TEST_DIR"

          TARBALL=$(ls "$GITHUB_WORKSPACE"/release/symfluence-tools-*.tar.gz 2>/dev/null | head -1)
          # --force-local: treat D: as filename, not remote host (Windows only; BSD tar doesn't support it)
          TAR_ARGS="-xzf"
          case "$(uname -s 2>/dev/null)" in MSYS*|MINGW*|CYGWIN*) TAR_ARGS="--force-local $TAR_ARGS" ;; esac
          tar $TAR_ARGS "$TARBALL"

          # Verify lib/ directory was included
          echo "-> Checking lib/ directory..."
          if [ -d "./symfluence-tools/lib" ]; then
            echo "  lib/ contents:"
            ls -lh ./symfluence-tools/lib/ 2>/dev/null || echo "  (empty)"
          else
            echo "  No lib/ directory found"
          fi

          # Test binaries run without original install directory
          echo "-> Testing SUMMA..."
          if [ -f "./symfluence-tools/bin/summa" ] || [ -f "./symfluence-tools/bin/summa.exe" ]; then
            ./symfluence-tools/bin/summa --version 2>&1 | head -5 || echo "  SUMMA version check completed"
          fi

          echo "-> Testing NGEN..."
          if [ -f "./symfluence-tools/bin/ngen" ] || [ -f "./symfluence-tools/bin/ngen.exe" ]; then
            ./symfluence-tools/bin/ngen --help 2>&1 | head -5 || echo "  NGEN help check completed"
          fi

          echo "Relocatability test complete"

      # ========================================================================
      # Upload to GitHub Release
      # ========================================================================
      - name: Resolve release tag
        id: resolve-tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release
        if: steps.resolve-tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve-tag.outputs.tag }}
          files: |
            release/symfluence-tools-*.tar.gz
            release/symfluence-tools-*.sha256
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: symfluence-tools-${{ matrix.platform }}
          path: |
            release/symfluence-tools-*.tar.gz
            release/symfluence-tools-*.sha256
          retention-days: 90

  # ===========================================================================
  # Publish to npm
  # ===========================================================================
  publish-npm:
    name: Publish to npm
    needs: build-and-release
    runs-on: ubuntu-24.04
    # Proceed even if Windows build fails — it has no required binaries and
    # shouldn't block npm publishing for Linux/macOS users.
    if: ${{ !cancelled() && (needs.build-and-release.result == 'success' || needs.build-and-release.result == 'failure') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify required platform artifacts exist
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Checking release $TAG for required platform artifacts..."
          ASSETS=$(gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null || true)
          MISSING=0
          for platform in linux-x86_64 macos-arm64; do
            if echo "$ASSETS" | grep -q "$platform"; then
              echo "Found artifact for $platform"
            else
              echo "ERROR: Missing artifact for $platform"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "Cannot publish to npm without Linux and macOS artifacts"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify package version matches release tag
        if: github.event_name == 'push'
        working-directory: npm
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "Release tag: $TAG"
          echo "Version from tag: $VERSION"
          echo "Package.json version: $PKG_VERSION"

          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "Version mismatch! package.json=$PKG_VERSION tag=$TAG"
            echo "Update npm/package.json to version $VERSION and try again"
            exit 1
          fi
          echo "Version check passed: $VERSION"

      - name: Publish to npm (dry run)
        if: github.event_name == 'workflow_dispatch'
        working-directory: npm
        run: |
          echo "Running npm publish in dry-run mode (workflow_dispatch)"
          npm publish --dry-run

      - name: Check if version already published
        if: github.event_name == 'push'
        id: npm-check
        working-directory: npm
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "symfluence@${PKG_VERSION}" version 2>/dev/null; then
            echo "Version ${PKG_VERSION} already published to npm, skipping"
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "Version ${PKG_VERSION} not yet published"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm (production)
        if: github.event_name == 'push' && steps.npm-check.outputs.already_published != 'true'
        working-directory: npm
        run: |
          echo "Publishing to npm registry..."
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish (scheduled rebuild)
        if: github.event_name == 'schedule'
        run: echo "Scheduled rebuild — skipping npm publish (binaries updated on GitHub Release only)"

  # ===========================================================================
  # Test npm Installation
  # ===========================================================================
  test-npm-install:
    name: Test npm Install (${{ matrix.os }})
    needs: publish-npm
    if: success()
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x86_64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libnetcdf19t64 libnetcdff7 libhdf5-103-1t64 libgdal34t64

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install netcdf netcdf-fortran hdf5 gdal

      - name: Install symfluence from npm
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref_name }}" == v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=""
          fi

          if [ -n "$TAG" ]; then
            VERSION="${TAG#v}"
            echo "Installing symfluence@${VERSION} from npm..."
            npm install -g "symfluence@${VERSION}"
          else
            echo "Installing latest symfluence from npm..."
            npm install -g symfluence
          fi

      - name: Test CLI commands
        run: |
          echo "Testing symfluence CLI commands..."

          symfluence help
          echo "help command works"

          symfluence version
          echo "version command works"

          symfluence path
          echo "path command works"

      - name: Test info command and binary detection
        run: |
          echo "Testing symfluence info..."
          symfluence info

          # Verify binaries directory exists
          BIN_DIR=$(symfluence path)
          if [ ! -d "$BIN_DIR" ]; then
            echo "Binary directory not found: $BIN_DIR"
            exit 1
          fi
          echo "Binary directory exists: $BIN_DIR"

      - name: Verify critical binaries exist
        run: |
          BIN_DIR=$(symfluence path)
          FOUND=0
          MISSING_REQUIRED=0

          # Platform-specific requirements
          if [ "${{ runner.os }}" = "Linux" ]; then
            REQUIRED_BINS="summa mizuroute"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            # Windows: Fortran cross-compilation is unreliable; no required binaries
            REQUIRED_BINS=""
          else
            REQUIRED_BINS="mizuroute"
          fi

          OPTIONAL_BINS="fuse ngen vic swat prms mhm crhm wrfhydro watflood mf6 parflow pihm gsflow clm rhessys hype mesh"

          for binary in $REQUIRED_BINS; do
            if [ -f "$BIN_DIR/$binary" ] || [ -f "$BIN_DIR/$binary.exe" ]; then
              echo "Found $binary"
              FOUND=$((FOUND + 1))
            else
              echo "Missing required binary: $binary"
              MISSING_REQUIRED=$((MISSING_REQUIRED + 1))
            fi
          done

          for binary in $OPTIONAL_BINS; do
            if [ -f "$BIN_DIR/$binary" ] || [ -f "$BIN_DIR/$binary.exe" ]; then
              echo "Found $binary"
              FOUND=$((FOUND + 1))
            else
              echo "Optional binary not found: $binary"
            fi
          done

          echo "Found $FOUND binaries total"
          if [ $MISSING_REQUIRED -gt 0 ]; then
            echo "$MISSING_REQUIRED required binaries missing"
            exit 1
          fi

      - name: Test binary execution
        run: |
          BIN_DIR=$(symfluence path)

          echo "Testing SUMMA..."
          "$BIN_DIR/summa" --version 2>&1 | head -5 || echo "  SUMMA help displayed"

          echo "Testing mizuRoute..."
          "$BIN_DIR/mizuroute" --help 2>&1 | head -5 || echo "  mizuRoute help displayed"

          echo "Testing NGEN..."
          "$BIN_DIR/ngen" --version 2>&1 | head -5 || echo "  NGEN version displayed"

          echo "All critical binaries are executable"

      - name: Summary
        if: success()
        run: |
          echo "========================================="
          echo "npm Installation Test Summary"
          echo "========================================="
          echo "Platform: ${{ matrix.platform }}"
          echo "Package installed successfully"
          echo "CLI commands work"
          echo "Binaries downloaded and verified"
          echo "Critical tools are executable"

  # ===========================================================================
  # Release Summary
  # ===========================================================================
  release-summary:
    name: Release Summary
    needs: [build-and-release, publish-npm, test-npm-install]
    runs-on: ubuntu-24.04
    if: always()

    steps:
      - name: Summary
        run: |
          echo "========================================="
          echo "Release Build Summary"
          echo "========================================="
          echo "Build status: ${{ needs.build-and-release.result }}"
          echo "npm publish status: ${{ needs.publish-npm.result }}"
          echo "npm install tests: ${{ needs.test-npm-install.result }}"

          if [ "${{ needs.build-and-release.result }}" = "success" ]; then
            echo "✅ All platform builds completed successfully"
            echo ""
            echo "Release artifacts uploaded to:"

            if [ -n "${{ github.event.inputs.tag }}" ]; then
              TAG="${{ github.event.inputs.tag }}"
            elif [[ "${{ github.ref_name }}" == v* ]]; then
              TAG="${{ github.ref_name }}"
            else
              TAG="latest"
            fi

            echo "https://github.com/${{ github.repository }}/releases/tag/${TAG}"
            echo ""
            echo "Artifacts:"
            echo "  - symfluence-tools-${TAG}-linux-x86_64.tar.gz"
            echo "  - symfluence-tools-${TAG}-macos-arm64.tar.gz"
            echo "  - symfluence-tools-${TAG}-windows-x86_64.tar.gz"
          else
            echo "❌ Release build failed"
            exit 1
          fi

          if [ "${{ needs.publish-npm.result }}" = "success" ]; then
            echo ""
            echo "📦 npm package published successfully"
            echo "   Install with: npm install -g symfluence"
          elif [ "${{ needs.publish-npm.result }}" = "skipped" ]; then
            echo ""
            echo "ℹ️  npm publish skipped (prerelease or workflow_dispatch)"
          else
            echo ""
            echo "⚠️  npm publish failed or was skipped"
          fi

          if [ "${{ needs.test-npm-install.result }}" = "success" ]; then
            echo ""
            echo "✅ npm installation tests passed on both platforms"
          elif [ "${{ needs.test-npm-install.result }}" = "skipped" ]; then
            echo ""
            echo "ℹ️  npm installation tests skipped"
          else
            echo ""
            echo "⚠️  npm installation tests failed or incomplete"
          fi
