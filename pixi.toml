[workspace]
name = "symfluence"
platforms = ["linux-64", "osx-arm64", "win-64"]
channels = ["conda-forge", "pytorch"]

[dependencies]
python = ">=3.11,<3.14"

# HDF5/NetCDF stack (single shared libhdf5 — the whole point)
hdf5 = ">=1.14"
h5py = "*"
netcdf4 = ">=1.6,<2"
h5netcdf = ">=1.1,<2"

# Geospatial — upper bounds match pyproject.toml to avoid conda↔PyPI conflicts
gdal = "*"
rasterio = ">=1.3,<2"
fiona = ">=1.9,<2"
geopandas = ">=0.13,<2"
pyproj = ">=3.5,<4"
shapely = ">=2.0,<3"
rasterstats = "*"
contextily = "*"

# Scientific — upper bounds match pyproject.toml
numpy = ">=2.0,<3"
pandas = ">=2.0,<3"
scipy = ">=1.10,<2"
xarray = ">=2023.0,<2026.0"
cftime = ">=1.6,<2"
numexpr = ">=2.8,<3"
bottleneck = ">=1.3,<2"
networkx = ">=3.0,<4"
scikit-learn = ">=1.2,<2"
pint-xarray = "*"
dask = "*"
distributed = "*"

# PyTorch (CPU) — upper bound matches pyproject.toml
pytorch = { version = ">=2.0,<3", channel = "pytorch" }
cpuonly = { version = "*", channel = "pytorch" }

# Visualization — upper bounds match pyproject.toml
matplotlib = ">=3.7,<4"
seaborn = ">=0.12,<1"
plotly = ">=5.0,<6"

# Utilities — upper bounds match pyproject.toml
pyyaml = ">=6.0,<7"
requests = ">=2.28,<3"
psutil = ">=5.9,<6"
tqdm = ">=4.64,<5"
rich = ">=13.0,<14"
pydantic = ">=2.0,<3"
salib = ">=1.4,<2"
pvlib-python = "*"
cdsapi = ">=0.6,<1"

# Build tools (for compiling external models)
cmake = "*"
make = "*"
compilers = "*"

# pip needed for pypi-dependencies
pip = "*"

[pypi-dependencies]
# Packages not on conda-forge (or better from PyPI).
# NOTE: JAX model plugins (jsnow17, jsacsma, etc.) and dcoupler are NOT listed
# here because they depend on symfluence, creating a circular solve conflict
# with conda-pinned versions. They are installed by `pip install symfluence`
# (npm path) or `pip install -e .` (bootstrap path) after the env is created.
easymore = "*"
pyviscous = "*"
hydrobm = "*"
openai = ">=1.0,<2"
cdo = ">=1.6,<3"
gcsfs = ">=2023.0"
intake-xarray = "*"
s3fs = ">=2023.0"

[feature.test.dependencies]
pytest = ">=7.0"
pytest-xdist = ">=3.0"
pytest-cov = ">=4.0"
pytest-timeout = ">=2.0"
hypothesis = ">=6.0"

# Build feature — CI uses this to compile external hydrological models.
# Provides compilers, build tools, and libraries needed by the model
# build_instructions.py scripts.
[feature.build.dependencies]
fortran-compiler = "*"
c-compiler = "*"
cxx-compiler = "*"
cmake = "*"
make = "*"
netcdf-fortran = "*"
hdf5 = ">=1.14"
openblas = "*"
udunits2 = "*"
boost-cpp = "*"
proj = "*"
expat = "*"
libxml2 = "*"
meson = "*"

[feature.build.target.linux-64.dependencies]
openmpi = "*"
patchelf = "*"
m4 = "*"
flex = "*"
perl = "*"

[feature.build.target.osx-arm64.dependencies]
openmpi = "*"
m4 = "*"
flex = "*"
perl = "*"

[environments]
default = { features = [], solve-group = "default" }
test = { features = ["test"], solve-group = "default" }
build = { features = ["build"] }
