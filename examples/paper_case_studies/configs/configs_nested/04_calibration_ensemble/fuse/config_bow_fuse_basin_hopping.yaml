system:
  data_dir: default
  code_dir: default
  num_processes: 1
  force_run_all_steps: true
  random_seed: 42
domain:
  name: Bow_at_Banff_lumped_calibration_ensemble
  pour_point_coords: 51.1722/-115.5717
  bounding_box_coords: 51.76/-116.55/50.95/-115.5
  definition_method: lumped
  discretization: GRUs
  delineation:
    routing: lumped
    geofabric_type: TDX
    stream_threshold: 10000
    lumped_watershed_method: TauDEM
  time_start: 2002-01-01 01:00
  time_end: 2009-12-31 23:00
  calibration_period: 2004-01-01, 2007-12-31
  evaluation_period: 2008-01-01, 2009-12-31
  spinup_period: 2002-01-01, 2003-12-31
  experiment_id: cal_ensemble_fuse_basin_hopping
data:
  streamflow_data_provider: WSC
forcing:
  dataset: RDRS
  variables: default
  measurement_height: 2
  time_step_size: 3600
model:
  hydrological_model: FUSE
  routing_model: none
  fuse:
    spatial_mode: lumped
    run_internal_calibration: false
    file_id: calens
    exe: fuse.exe
    filemanager: fm_catch.txt
    decision_options:
      RFERR:
      - multiplc_e
      ARCH1:
      - tension1_1
      ARCH2:
      - tens2pll_2
      QSURF:
      - arno_x_vic
      QPERC:
      - perc_f2sat
      ESOIL:
      - rootweight
      QINTF:
      - intflwnone
      Q_TDH:
      - rout_gamma
      SNOWM:
      - temp_index
    params_to_calibrate: MAXWATR_1,MAXWATR_2,FRACTEN,RTFRAC1,PERCRTE,BASERTE,QB_POWR,TIMEDELAY,MBASE,MFMAX,MFMIN,PXTEMP,LAPSE
    param_bounds:
      MAXWATR_1:
      - 25
      - 500
      MAXWATR_2:
      - 50
      - 5000
      FRACTEN:
      - 0.05
      - 0.95
      RTFRAC1:
      - 0.05
      - 0.95
      PERCRTE:
      - 0.1
      - 1000.0
      BASERTE:
      - 0.001
      - 1000.0
      QB_POWR:
      - 1.0
      - 10.0
      TIMEDELAY:
      - 0.01
      - 5.0
      MBASE:
      - 0.0
      - 3.0
      MFMAX:
      - 2.0
      - 8.0
      MFMIN:
      - 0.4
      - 6.0
      PXTEMP:
      - -1.0
      - 5.0
      LAPSE:
      - -7.0
      - -4.0
    warmup_days: 730
    template_path: default
optimization:
  methods:
  - iteration
  metric: KGE
  algorithm: BASIN-HOPPING
  iterations: 20
  target_metric: KGE
  skip_warm_start: true
  bh_local_steps: 50
evaluation:
  streamflow:
    station_id: 05BB001
    download_wsc: true
