system:
  data_dir: default
  code_dir: default
  num_processes: 1
  force_run_all_steps: true
  random_seed: 42
domain:
  name: Bow_at_Banff_lumped_calibration_ensemble
  pour_point_coords: 51.1722/-115.5717
  bounding_box_coords: 51.76/-116.55/50.95/-115.5
  definition_method: lumped
  discretization: GRUs
  delineation:
    routing: lumped
    geofabric_type: TDX
    stream_threshold: 10000
    lumped_watershed_method: TauDEM
  time_start: 2002-01-01 01:00
  time_end: 2009-12-31 23:00
  calibration_period: 2004-01-01, 2007-12-31
  evaluation_period: 2008-01-01, 2009-12-31
  spinup_period: 2002-01-01, 2003-12-31
  experiment_id: cal_ensemble_summa_nsga2
data:
  streamflow_data_provider: WSC
forcing:
  dataset: RDRS
  variables: default
  measurement_height: 2
  time_step_size: 3600
model:
  hydrological_model: SUMMA
  routing_model: none
  summa:
    warmup_days: 730
optimization:
  methods:
  - iteration
  metric: KGE
  algorithm: NSGA-II
  iterations: 20
  population_size: 50
  nsga2:
    multi_target: true
    primary_metric: KGE
    secondary_metric: NSE
    crossover_rate: 0.9
    mutation_rate: 0.1
  target_metric: KGE
  skip_warm_start: true
evaluation:
  streamflow:
    station_id: 05BB001
    download_wsc: true
