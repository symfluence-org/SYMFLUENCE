# WATFLOOD - Section 3.1 Model Ensemble
# Inherits from: ../_base_bow_lumped.yaml
# WATFLOOD/CHARM hydrological model

system:
  data_dir: ./data/
  code_dir: ./
domain:
  name: Bow_at_Banff_lumped_era5
  pour_point_coords: 51.1722/-115.5717
  bounding_box_coords: 51.76/-116.55/50.95/-115.5
  definition_method: lumped
  delineation:
    routing: lumped
    geofabric_type: TDX
    stream_threshold: 5000
  time_start: 2002-01-01 01:00
  time_end: 2009-12-31 23:00
  calibration_period: 2004-01-01, 2007-12-31
  evaluation_period: 2008-01-01, 2009-12-31
  spinup_period: 2002-01-01, 2003-12-31
  discretization: GRUs
  experiment_id: run_1
data:
  streamflow_data_provider: WSC
forcing:
  dataset: ERA5
  time_step_size: 3600
model:
  hydrological_model: WATFLOOD
  routing_model: none
  watflood:
    params_to_calibrate: FLZCOEF,PWR,R2N,AK,AKF,REESSION,RETN,AK2,AK2FS,R3,DS,FPET,FTALL,FM,BASE,SUBLIM_FACTOR
optimization:
  methods:
  - iteration
  algorithm: DDS
  iterations: 1000
  metric: KGE
evaluation:
  streamflow:
    station_id: 05BB001
