# Parallel Scaling - Calibration parallelism (Section 3.10, Figure 14b)
# Tests DDS calibration with parallel model evaluations

system:
  data_dir: ./data/
  code_dir: ./
domain:
  name: Bow_at_Banff_scaling
  experiment_id: calibration_scaling
  time_start: 2002-01-01 01:00
  time_end: 2009-12-31 23:00
  calibration_period: 2004-01-01, 2007-12-31
  evaluation_period: 2008-01-01, 2009-12-31
  spinup_period: 2002-01-01, 2003-12-31
  pour_point_coords: 51.1722/-115.5717
  bounding_box_coords: 51.76/-116.55/50.95/-115.5
  definition_method: lumped
  discretization: GRUs
forcing:
  dataset: ERA5
model:
  hydrological_model: SUMMA
  routing_model: none
  summa:
    use_parallel: true
    cpus_per_task: 12
optimization:
  methods:
  - iteration
  algorithm: DDS
  iterations: 20000
  dds:
    async_pool_size: 12
