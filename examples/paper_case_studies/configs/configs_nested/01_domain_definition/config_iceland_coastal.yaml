# Experiment 1: Iceland + coastal watersheds - semi-distributed
# Paper Section 2.3, Table 2, Figure 1c
# 7618 GRUs (6606 river basin + 1012 coastal), 7618 HRUs, 6606 segments
# Adds coastal drainage areas for complete spatial coverage of Iceland

system:
  data_dir: ./data/
  code_dir: ./
domain:
  name: Iceland_coastal
  definition_method: semidistributed
  bounding_box_coords: 66.6/-24.6/63.2/-13.2
  delineation:
    routing: distributed
    delineate_coastal_watersheds: true
    geofabric_type: TDX
    stream_threshold: 5000
  time_start: 2000-01-01 03:00
  time_end: 2008-12-31 21:00
  discretization: GRUs
  experiment_id: Iceland_coastal
forcing:
  dataset: CARRA
model:
  hydrological_model: FUSE
  routing_model: mizuRoute
  fuse:
    spatial_mode: distributed
