# Experiment 1a: Point-scale domain definition - Paradise SNOTEL, WA
# Paper Section 2 - Domain Definition
# Tests: Point-scale domain setup with ERA5 forcing and SUMMA

system:
  data_dir: ./data/
  code_dir: ./
domain:
  name: paradise_snotel_wa_era5
  definition_method: point
  pour_point_coords: 46.78/-121.75
  time_start: 2015-01-01 01:00
  time_end: 2020-12-31 23:00
  calibration_period: 2015-10-01, 2018-09-30
  evaluation_period: 2018-10-01, 2020-09-30
  spinup_period: 2015-01-01, 2015-09-30
  discretization: GRUs
  experiment_id: paradise_snotel_wa_era5
forcing:
  dataset: ERA5
model:
  hydrological_model: SUMMA
  routing_model: none
