# Experiment 1: Distributed (gridded) - Bow River at Banff
# Paper Section 2.2, Table 2, Figure 1f
# 2335 GRUs, 2335 HRUs, 2335 segments — 1 km grid cells
# Highest spatial resolution: each grid cell is its own GRU, HRU, and segment

system:
  data_dir: ./data/
  code_dir: ./
domain:
  name: Bow_at_Banff_distributed
  definition_method: distributed
  pour_point_coords: 51.1722/-115.5717
  bounding_box_coords: 51.76/-116.55/50.95/-115.5
  delineation:
    routing: distributed
    geofabric_type: TDX
    stream_threshold: 5000
  grid_cell_size: 1000
  time_start: 2002-01-01 01:00
  time_end: 2009-12-31 23:00
  calibration_period: 2004-01-01, 2007-12-31
  evaluation_period: 2008-01-01, 2009-12-31
  spinup_period: 2002-01-01, 2003-12-31
  discretization: GRUs
  experiment_id: Bow_at_Banff_distributed
forcing:
  dataset: ERA5
model:
  hydrological_model: SUMMA
  routing_model: mizuRoute
