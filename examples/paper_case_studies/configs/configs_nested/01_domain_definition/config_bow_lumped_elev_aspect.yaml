# Experiment 1: Lumped + elevation & aspect - Bow River at Banff
# Paper Section 2.2, Table 2, Figure 1k
# 1 GRU, 94 HRUs (elevation bands x aspect classes), 0 segments
# Maximum sub-grid complexity without explicit sub-basin delineation

system:
  data_dir: ./data/
  code_dir: ./
domain:
  name: Bow_at_Banff_lumped_elev_aspect
  definition_method: lumped
  pour_point_coords: 51.1722/-115.5717
  bounding_box_coords: 51.76/-116.55/50.95/-115.5
  delineation:
    routing: lumped
  discretization: elevation_aspect
  elevation_band_size: 200
  aspect_class_number: 8
  time_start: 2002-01-01 01:00
  time_end: 2009-12-31 23:00
  calibration_period: 2004-01-01, 2007-12-31
  evaluation_period: 2008-01-01, 2009-12-31
  spinup_period: 2002-01-01, 2003-12-31
  experiment_id: Bow_at_Banff_lumped_elev_aspect
forcing:
  dataset: ERA5
  apply_lapse_rate: true
  lapse_rate: 0.0065
model:
  hydrological_model: SUMMA
  routing_model: none
