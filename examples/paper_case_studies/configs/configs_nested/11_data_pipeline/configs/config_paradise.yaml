# Data Pipeline - Paradise Creek point-scale (Section 3.10)
# Demonstrates automated data acquisition and preprocessing

system:
  data_dir: ./data/
  code_dir: ./
domain:
  name: paradise_snotel_wa
  experiment_id: pipeline_paradise
  time_start: 2015-01-01 01:00
  time_end: 2020-12-31 23:00
  pour_point_coords: 46.78/-121.75
