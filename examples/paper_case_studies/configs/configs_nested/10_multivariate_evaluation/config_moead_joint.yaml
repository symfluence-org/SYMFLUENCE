# Experiment 10d: Joint streamflow+TWS calibration using MOEA/D (Section 3.9)
# Multi-objective: streamflow KGE + GRACE TWS correlation
# Comparison with NSGA-II (config_joint.yaml) using same budget

system:
  data_dir: ./data/
  code_dir: ./
domain:
  name: Bow_at_Banff_multivar
  experiment_id: bow_exp4_moead_joint
  time_start: 2002-04-01 01:00
  time_end: 2017-12-31 23:00
  calibration_period: 2004-01-01, 2010-12-31
  evaluation_period: 2011-01-01, 2017-12-31
  spinup_period: 2002-04-01, 2003-12-31
  pour_point_coords: 51.1722/-115.5717
  bounding_box_coords: 51.76/-116.55/50.95/-115.5
  definition_method: lumped
  delineation:
    routing: lumped
  discretization: GRUs
data:
  streamflow_data_provider: WSC
forcing:
  dataset: RDRS
model:
  hydrological_model: SUMMA
  routing_model: none
  summa:
    params_to_calibrate: albedoMax,albedoMinWinter,newSnowDenMin,Fcapil,k_soil,theta_sat,critSoilWilting,critSoilTranspire,theta_res,f_impede,aquiferBaseflowExp,aquiferBaseflowRate,aquiferScaleFactor,specificStorage,specificYield
    basin_params_to_calibrate: routingGammaShape,routingGammaScale
optimization:
  methods:
  - iteration
  algorithm: MOEAD
  iterations: 50
  population_size: 40
  moead:
    multi_target: true
    primary_target: streamflow
    secondary_target: TWS
    primary_metric: KGE
    secondary_metric: correlation
    neighbors: 20
    cr: 1.0
    f: 0.5
    mutation: 0.1
    decomposition: tchebycheff
  skip_warm_start: true
evaluation:
  streamflow:
    station_id: 05BB001
  grace:
    download: true
    product: GRACE_JPL_RL06_mascon
    tws_variable: lwe_thickness
    anomaly_baseline: 2004-01-01, 2009-12-31
  calibration_targets:
  - variable: streamflow
    source: WSC
    station_id: 05BB001
    metric: KGE
    weight: 0.5
  - variable: TWS
    source: GRACE
    metric: correlation
    weight: 0.5
  multivar_evaluation: true
