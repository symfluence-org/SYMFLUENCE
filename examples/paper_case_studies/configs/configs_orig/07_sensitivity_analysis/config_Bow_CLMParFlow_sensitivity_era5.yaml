### ============================================= 4. Model Specific settings: =============================================================

## Model settings
HYDROLOGICAL_MODEL: CLMPARFLOW

# CLMParFlow installation (ParFlow compiled with -DPARFLOW_HAVE_CLM=ON)
CLMPARFLOW_INSTALL_PATH: default
CLMPARFLOW_EXE: parflow
CLMPARFLOW_DIR: default
SETTINGS_CLMPARFLOW_PATH: default
CLMPARFLOW_SPATIAL_MODE: lumped

# Grid — 3x1x1 avoids ParFlow isolated-cell issue; 2 m active soil zone
CLMPARFLOW_NX: 3
CLMPARFLOW_NY: 1
CLMPARFLOW_NZ: 1
CLMPARFLOW_DX: 1000.0
CLMPARFLOW_DY: 1000.0
CLMPARFLOW_DZ: 2.0

# Domain geometry — 2 m active soil column
CLMPARFLOW_TOP: 2.0
CLMPARFLOW_BOT: 0.0

# Topographic slope — enables overland flow routing via kinematic wave
CLMPARFLOW_SLOPE_X: 0.01

# Subsurface hydraulic properties (van Genuchten / Richards equation)
CLMPARFLOW_K_SAT: 0.026
CLMPARFLOW_POROSITY: 0.111
CLMPARFLOW_VG_ALPHA: 0.021
CLMPARFLOW_VG_N: 4.19
CLMPARFLOW_S_RES: 0.272
CLMPARFLOW_S_SAT: 1.0
CLMPARFLOW_SS: 1e-5

# Overland flow
CLMPARFLOW_MANNINGS_N: 0.016

# CLM-specific settings
CLMPARFLOW_VEGM_FILE: default
CLMPARFLOW_VEGP_FILE: default
CLMPARFLOW_DRV_CLMIN_FILE: default
CLMPARFLOW_ISTEP_START: 1
CLMPARFLOW_CLM_METFILE: forcing.1d
CLMPARFLOW_CLM_METPATH: .

# Solver
CLMPARFLOW_SOLVER: Richards
CLMPARFLOW_TIMESTEP_HOURS: 1.0
CLMPARFLOW_DUMP_INTERVAL_HOURS: 24.0
CLMPARFLOW_NUM_PROCS: 1
CLMPARFLOW_TIMEOUT: 7200

# CLMParFlow calibration parameters (14 total — subsurface + Snow-17 + lapse rate + routing)
CLMPARFLOW_PARAMS_TO_CALIBRATE: K_SAT,POROSITY,VG_ALPHA,VG_N,S_RES,MANNINGS_N,SNOW17_SCF,SNOW17_MFMAX,SNOW17_MFMIN,SNOW17_PXTEMP,SNOW_LAPSE_RATE,ROUTE_ALPHA,ROUTE_K_SLOW,ROUTE_BASEFLOW

