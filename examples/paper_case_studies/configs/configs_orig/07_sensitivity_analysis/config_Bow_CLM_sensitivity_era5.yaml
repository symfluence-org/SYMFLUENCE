TARGET_METRIC: KGE

# CLM Parameter Bounds for calibration (29 parameters)
# 5 log-transformed: baseflow_scalar, ksatdecay, perched_baseflow_scalar, hksat_mult, SNO_Z0MV
CLM_PARAM_BOUNDS:
  # Hydrology (namelist + params.nc)
  baseflow_scalar: [0.001, 0.1]                                # Baseflow rate scalar (log transform)
  fff: [0.02, 1.0]                                             # Fractional saturated area decay
  wimp: [0.01, 0.1]                                            # Min soil moisture for transpiration
  ksatdecay: [0.1, 10.0]                                      # Ksat decay with depth (log transform)
  n_baseflow: [0.5, 5.0]                                      # Baseflow recession exponent
  e_ice: [1.0, 6.0]                                            # Frozen soil impedance (default 6 blocks winter drainage)
  perched_baseflow_scalar: [0.0000001, 0.001]                  # Perched WT baseflow (log transform)
  interception_fraction: [0.2, 1.0]                            # Canopy rain interception fraction
  max_leaf_wetted_frac: [0.01, 0.2]                            # Max leaf wetted fraction
  # Surfdata (soil hydraulic multipliers)
  fmax: [0.0, 1.0]                                             # Max fractional saturated area
  bsw_mult: [0.5, 2.0]                                        # Clapp-Hornberger B multiplier
  sucsat_mult: [0.5, 2.0]                                     # Saturated suction multiplier
  watsat_mult: [0.8, 1.2]                                     # Porosity multiplier (tight for stability)
  hksat_mult: [0.1, 10.0]                                     # Saturated hydraulic cond. multiplier (log, tightened from [0.01, 100])
  organic_max: [0.0, 130.0]                                    # Maximum organic matter
  # Snow (params.nc + namelist)
  fresh_snw_rds_max: [50.0, 200.0]                             # Fresh snow grain radius max
  snw_aging_bst: [0.0, 200.0]                                  # Snow aging bias
  SNO_Z0MV: [0.0001, 0.01]                                    # Snow surface roughness (log transform)
  accum_factor: [-0.1, 0.1]                                    # Snow accumulation factor
  SNOW_DENSITY_MAX: [250.0, 550.0]                             # Maximum snow density (kg/m3)
  SNOW_DENSITY_MIN: [50.0, 200.0]                              # Minimum snow density (kg/m3)
  n_melt_coef: [50.0, 500.0]                                  # Snowmelt coefficient
  int_snow_max: [500.0, 5000.0]                                # Max integrated snowfall (namelist)
  # Vegetation/PFT (params.nc)
  medlynslope: [2.0, 12.0]                                    # Medlyn stomatal slope
  slatop: [0.005, 0.06]                                        # Specific leaf area at canopy top
  flnr: [0.05, 0.25]                                          # Fraction of leaf N in RuBisCO
  froot_leaf: [0.5, 3.0]                                      # Fine root:leaf allocation
  stem_leaf: [0.5, 3.0]                                        # Stem:leaf allocation
  # Routing (post-processing — CLM produces instantaneous runoff)
  route_k: [1.0, 40.0]                                        # Linear reservoir storage constant (days)

# DDS specific settings
DDS_R: 0.2
ASYNC_DDS_POOL_SIZE: 1
ASYNC_DDS_BATCH_SIZE: 1
MAX_STAGNATION_BATCHES: 5
