### ============================================= 4. Model Specific settings: =============================================================
## Model settings
HYDROLOGICAL_MODEL: CLM                                        # Community Land Model (CTSM 5.x)
ROUTING_MODEL: none                                            # CLM uses internal QRUNOFF — no external routing

# ============================================= CLM Settings =============================================================
# CLM Installation
CLM_INSTALL_PATH: default                                      # Path to CLM/CTSM installation, if default uses installs/clm/bin
CLM_EXE: cesm.exe                                              # CLM executable name (compiled via CIME)

# CLM Model Settings
CLM_SPATIAL_MODE: lumped                                       # Spatial mode: lumped (single-point)
SETTINGS_CLM_PATH: default                                     # Path to CLM settings directory
CLM_COMPSET: I1PtClm50SpRs                                    # CESM compset: satellite phenology, present-day
CLM_PARAMS_FILE: clm5_params.nc                                # CLM parameter file
CLM_SURFDATA_FILE: surfdata_clm.nc                             # Surface data file
CLM_DOMAIN_FILE: domain.nc                                     # Domain file

# CLM Output Settings
CLM_HIST_NHTFRQ: -24                                           # History output frequency (-24 = daily averages)
CLM_HIST_MFILT: 365                                            # Max time samples per history file
EXPERIMENT_OUTPUT_CLM: default                                 # Output directory

# CLM Warmup / Spinup
CLM_WARMUP_DAYS: 365                                            # 1 year (2003) — warm restart from default spinup, 1yr for soil adjustment
CLM_TIMEOUT: 2400                                              # Model execution timeout (7-20 min sim + 60s finalization grace)

# CLM Calibration Parameters (26 params across params.nc, surfdata, and lnd_in)
# --- Hydrology: 8 params ---
#   baseflow_scalar: Baseflow rate scalar [0.001-0.1] (log) — namelist
#   fff: Decay factor for fractional saturated area [0.02-1.0] — params.nc
#   wimp: Min soil moisture for transpiration [0.01-0.1] — params.nc
#   ksatdecay: Ksat decay factor with depth [0.1-10.0] (log) — params.nc (pc)
#   n_baseflow: Baseflow recession exponent [0.5-5.0] — params.nc
#   perched_baseflow_scalar: Perched WT baseflow [1e-7-1e-3] (log) — params.nc
#   interception_fraction: Canopy rain interception [0.2-1.0] — params.nc
#   max_leaf_wetted_frac: Max leaf wetted fraction [0.01-0.2] — params.nc
# --- Surfdata: 6 params ---
#   fmax, bsw_mult, sucsat_mult, watsat_mult, hksat_mult, organic_max
# --- Snow: 7 params ---
#   fresh_snw_rds_max, snw_aging_bst, SNO_Z0MV, accum_factor,
#   SNOW_DENSITY_MAX, SNOW_DENSITY_MIN, n_melt_coef, int_snow_max
# --- Vegetation/PFT: 5 params ---
#   medlynslope, slatop, flnr, froot_leaf, stem_leaf
CLM_PARAMS_TO_CALIBRATE: baseflow_scalar,fff,wimp,ksatdecay,n_baseflow,e_ice,perched_baseflow_scalar,interception_fraction,max_leaf_wetted_frac,fmax,bsw_mult,sucsat_mult,watsat_mult,hksat_mult,organic_max,fresh_snw_rds_max,snw_aging_bst,SNO_Z0MV,accum_factor,SNOW_DENSITY_MAX,SNOW_DENSITY_MIN,n_melt_coef,int_snow_max,medlynslope,slatop,flnr,froot_leaf,stem_leaf,route_k

# ============================================= End CLM Settings =========================================================

