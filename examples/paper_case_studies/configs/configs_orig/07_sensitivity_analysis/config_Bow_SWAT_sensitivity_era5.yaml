### ============================================= 4. Model Specific settings: =============================================================
## SWAT (Soil and Water Assessment Tool)
HYDROLOGICAL_MODEL: SWAT                                       # Hydrological model: SWAT
ROUTING_MODEL: none                                            # No external routing (SWAT has internal channel routing)

# SWAT installation and executable
SWAT_INSTALL_PATH: default                                     # SWAT installation path, if default uses installs/swat/bin
SWAT_EXE: swat_rel.exe                                         # Name of SWAT executable
SETTINGS_SWAT_PATH: default                                    # Path to SWAT settings directory
SWAT_TXTINOUT_DIR: TxtInOut                                    # SWAT text input/output directory name

# SWAT spatial configuration
SWAT_SPATIAL_MODE: lumped                                      # Spatial mode: lumped or distributed
EXPERIMENT_OUTPUT_SWAT: default                                # Path to SWAT output, if default uses simulations/run_1/SWAT

# SWAT warmup and calibration
SWAT_WARMUP_YEARS: 2                                           # Number of warmup years for SWAT simulation
SWAT_PARAMS_TO_CALIBRATE: CN2,ALPHA_BF,GW_DELAY,GWQMN,GW_REVAP,ESCO,SOL_AWC,SOL_K,SURLAG,SFTMP,SMTMP,SMFMX,SMFMN,TIMP,CH_K2,RCHRG_DP,EPCO
SWAT_TLAPS: -6.5                                               # Temperature lapse rate [deg C/km] (std atmosphere)
SWAT_PLAPS: 100.0                                              # Precipitation lapse rate [mm H2O/km] (typical mountain)

# SWAT parameter descriptions (17 params):
# CN2:       SCS runoff curve number (-25% to +25% relative change)
# ALPHA_BF:  Baseflow alpha factor (0-1 days)
# GW_DELAY:  Groundwater delay time (0-500 days)
# GWQMN:     Threshold depth for return flow (0-5000 mm)
# GW_REVAP:  Groundwater "revap" coefficient (0.02-0.2)
# ESCO:      Soil evaporation compensation factor (0-1)
# SOL_AWC:   Available water capacity (-25% to +25% relative)
# SOL_K:     Saturated hydraulic conductivity (-25% to +25% relative)
# SURLAG:    Surface runoff lag coefficient (0.05-24)
# SFTMP:     Snowfall temperature (deg C) (-5 to 5)
# SMTMP:     Snowmelt base temperature (deg C) (-5 to 5)
# SMFMX:     Maximum melt rate for snow during year (mm/deg C/day) (0-10)
# SMFMN:     Minimum melt rate for snow during year (mm/deg C/day) (0-10)
# TIMP:      Snow pack temperature lag factor (0.01-1)
# CH_K2:     Channel hydraulic conductivity (mm/hr) (0-150)
# RCHRG_DP:  Deep aquifer percolation fraction (0-1)
# EPCO:      Plant uptake compensation factor (0.01-1)

