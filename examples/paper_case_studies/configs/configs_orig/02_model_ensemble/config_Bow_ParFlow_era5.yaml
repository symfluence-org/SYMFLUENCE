FORCING_DATASET: ERA5
FORCING_VARIABLES: default
FORCING_MEASUREMENT_HEIGHT: 2
FORCING_TIME_STEP_SIZE: 3600
APPLY_LAPSE_RATE: True
LAPSE_RATE: 0.0065
FORCING_SHAPE_LAT_NAME: lat
FORCING_SHAPE_LON_NAME: lon
FORCING_PATH: default

### ============================================= 4. Model Specific settings: =============================================================

## Model settings
HYDROLOGICAL_MODEL: PARFLOW

# ParFlow installation
PARFLOW_INSTALL_PATH: default
PARFLOW_EXE: parflow
PARFLOW_DIR: default
SETTINGS_PARFLOW_PATH: default
PARFLOW_SPATIAL_MODE: lumped

# Grid — 3x1x1 avoids ParFlow isolated-cell issue; 2 m active soil zone
PARFLOW_NX: 3
PARFLOW_NY: 1
PARFLOW_NZ: 1
PARFLOW_DX: 1000.0
PARFLOW_DY: 1000.0
PARFLOW_DZ: 2.0

# Domain geometry — 2 m active soil column
PARFLOW_TOP: 2.0
PARFLOW_BOT: 0.0

# Topographic slope — enables overland flow routing via kinematic wave
PARFLOW_SLOPE_X: 0.01

# Subsurface hydraulic properties (van Genuchten / Richards equation)
PARFLOW_K_SAT: 5.0
PARFLOW_POROSITY: 0.4
PARFLOW_VG_ALPHA: 1.0
PARFLOW_VG_N: 2.0
PARFLOW_S_RES: 0.1
PARFLOW_S_SAT: 1.0
PARFLOW_SS: 1e-5

# Overland flow
PARFLOW_MANNINGS_N: 0.03

# Solver
PARFLOW_SOLVER: Richards
PARFLOW_TIMESTEP_HOURS: 1.0
PARFLOW_NUM_PROCS: 1
PARFLOW_TIMEOUT: 7200

# ParFlow calibration parameters (14 total — subsurface + Snow-17 + lapse rate + routing)
PARFLOW_PARAMS_TO_CALIBRATE: K_SAT,POROSITY,VG_ALPHA,VG_N,S_RES,MANNINGS_N,SNOW17_SCF,SNOW17_MFMAX,SNOW17_MFMIN,SNOW17_PXTEMP,SNOW_LAPSE_RATE,ROUTE_ALPHA,ROUTE_K_SLOW,ROUTE_BASEFLOW

# Widened bounds — snow melt factors were hitting ceilings, SCF near floor
PARFLOW_PARAM_BOUNDS:
  SNOW17_SCF: [0.4, 2.0]
  SNOW17_MFMAX: [0.5, 8.0]
  SNOW17_MFMIN: [0.05, 4.0]
  SNOW17_PXTEMP: [-5.0, 4.0]
  SNOW_LAPSE_RATE: [0.002, 0.012]

