### ============================================= 4. Model Specific settings: =============================================================
## CRHM (Cold Regions Hydrological Model)
HYDROLOGICAL_MODEL: CRHM                                       # Hydrological model: CRHM
ROUTING_MODEL: none                                            # No external routing (CRHM has internal routing modules)

# CRHM installation and executable
CRHM_INSTALL_PATH: default                                     # CRHM installation path, if default uses installs/crhm/bin
CRHM_EXE: crhm                                                # Name of CRHM executable
SETTINGS_CRHM_PATH: default                                    # Path to CRHM settings directory
CRHM_PROJECT_FILE: model.prj                                   # CRHM project file
CRHM_OBSERVATION_FILE: forcing.obs                             # CRHM observation/forcing file

# CRHM spatial configuration
CRHM_SPATIAL_MODE: lumped                                      # Spatial mode: lumped or distributed
EXPERIMENT_OUTPUT_CRHM: default                                # Path to CRHM output, if default uses simulations/run_1/CRHM

# CRHM calibration parameters (16 params) — basin_area fixed at known catchment value
CRHM_PARAMS_TO_CALIBRATE: Ht,inhibit_evap,soil_rechr_max,Sdmax,fetch,soil_gw_K,soil_moist_max,rechr_ssr_K,lower_ssr_K,Kstorage,Lag,tmax_allsnow,tmax_allrain,lapse_rate,gw_K,gw_max

# CRHM parameter descriptions:
# basin_area:       Basin area (km^2) — used for unit conversion
# Ht:               Vegetation height (m) (0.1-25)
# inhibit_evap:     Evapotranspiration inhibition factor (0-1)
# soil_rechr_max:   Maximum recharge zone soil moisture (mm) (10-500)
# Sdmax:            Maximum surface depression storage (mm) (0-100)
# fetch:            Blowing snow fetch distance (m) (100-5000)
# soil_gw_K:        Groundwater conductivity (mm/d) (0.001-100)
# soil_moist_max:   Maximum soil moisture content (mm) (50-1000)
# rechr_ssr_K:      Recharge zone subsurface flow coefficient (1/d) (0.001-1)
# lower_ssr_K:      Lower zone subsurface flow coefficient (1/d) (0.0001-0.5)
# Kstorage:         Muskingum K for routing attenuation (0-200)
# Lag:              Routing lag (0-100)
# tmax_allsnow:     All-snow temperature threshold (deg C) (-5 to 2)
# tmax_allrain:     All-rain temperature threshold (deg C) (0 to 8)
# lapse_rate:       Temperature lapse rate (0.3-1.5)
# gw_K:             Groundwater recession coefficient (0.0001-1.0)
# gw_max:           Maximum groundwater storage (mm) (50-500)

