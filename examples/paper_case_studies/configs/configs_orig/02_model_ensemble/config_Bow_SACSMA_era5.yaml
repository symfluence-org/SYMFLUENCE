### ============================================= 4. Model Specific settings: =============================================================

# Model settings
HYDROLOGICAL_MODEL: SACSMA
ROUTING_MODEL: none                                             # SAC-SMA is lumped only, no external routing

# SAC-SMA + Snow-17 settings
SACSMA_WARMUP_DAYS: 365                                         # Warmup period in days (matches spinup period)
SACSMA_LATITUDE: 51.17                                           # Latitude for Snow-17 seasonal melt factor
SACSMA_SI: 100.0                                                 # SWE threshold for areal depletion (mm)
SACSMA_PET_METHOD: hamon                                         # PET computation method

# SAC-SMA Calibration Parameters
# All 26 Snow-17 + SAC-SMA parameters calibrated by default.
# To calibrate a subset, specify comma-separated names:
# SACSMA_PARAMS_TO_CALIBRATE: SCF,MFMAX,MFMIN,UZTWM,UZFWM,UZK,LZTWM,LZFPM,LZFSM,LZPK,LZSK,ZPERC,REXP,PFREE
SACSMA_PARAMS_TO_CALIBRATE: all                                  # Calibrate all 26 parameters

# Snow-17 parameter descriptions (10 params):
# SCF:    Snowfall correction factor (0.7-1.4)
# PXTEMP: Rain/snow threshold temperature (-2 to 2 °C)
# MFMAX:  Maximum melt factor, Jun 21 (0.5-2.0 mm/°C/6hr)
# MFMIN:  Minimum melt factor, Dec 21 (0.05-0.6 mm/°C/6hr)
# NMF:    Negative melt factor (0.05-0.5 mm/°C/6hr)
# MBASE:  Base melt temperature (0-1 °C)
# TIPM:   Antecedent temperature index weight (0.01-1.0)
# UADJ:   Rain-on-snow wind function (0.01-0.2 mm/mb/6hr)
# PLWHC:  Liquid water holding capacity (0.01-0.3)
# DAYGM:  Daily ground melt (0-0.3 mm/day)

# SAC-SMA parameter descriptions (16 params):
# UZTWM:  Upper zone tension water max (1-150 mm)
# UZFWM:  Upper zone free water max (1-150 mm)
# UZK:    Upper zone lateral depletion (0.1-0.75 1/day)
# LZTWM:  Lower zone tension water max (1-500 mm)
# LZFPM:  Lower zone primary free water max (1-1000 mm) [log-transform]
# LZFSM:  Lower zone supplemental free water max (1-1000 mm) [log-transform]
# LZPK:   Primary baseflow depletion (0.001-0.05 1/day) [log-transform]
# LZSK:   Supplemental baseflow depletion (0.01-0.25 1/day) [log-transform]
# ZPERC:  Max percolation rate scaling (1-350) [log-transform]
# REXP:   Percolation curve exponent (1-5)
# PFREE:  Fraction percolation to free water (0-0.8)
# PCTIM:  Permanent impervious area (0-0.1)
# ADIMP:  Additional impervious area (0-0.4)
# RIVA:   Riparian vegetation ET fraction (0-0.2)
# SIDE:   Deep recharge fraction (0-0.5)
# RSERV:  Lower zone free water reserve (0-0.4)

