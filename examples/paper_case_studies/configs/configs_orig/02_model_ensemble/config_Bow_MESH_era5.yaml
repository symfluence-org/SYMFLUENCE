# MESH calibration parameters (CLASS.ini + hydrology.ini)
# VERSION 10: 13 params — added LAMX + ROOT for ET control
#   noroute mode (RFF+DRAINSOL proxy). FLZ/PWR/RCHARG inert.
#   RSMIN at 796/800 ceiling → LAMX and ROOT give optimizer additional ET levers.
#   Feasibility constraint: ROOT ≤ SDEP (enforced by parameter_manager).
MESH_PARAMS_TO_CALIBRATE: KSAT,DRN,SDEP,XSLP,ZSNL,ZPLS,ZPLG,XDRAINH,MANN_CLASS,FRZTH,RSMIN,LAMX,ROOT

# MESH Parameter descriptions:
# ===== Soil/Infiltration Parameters (CLASS.ini - control runoff generation) =====
# KSAT: Saturated hydraulic conductivity (mm/hr) - primary infiltration control
# DRN: Drainage parameter (-) - subsurface drainage rate (1=fast, 10=slow)
# SDEP: Soil depth (m) - controls water storage capacity
# XSLP: Slope (-) - affects overland flow speed
# XDRAINH: Horizontal drainage coefficient (-) - lateral subsurface flow
#
# ===== ET Control Parameters (CLASS.ini - vegetation/transpiration) =====
# RSMIN: Minimum stomatal resistance (s/m) - controls max transpiration rate
# LAMX: Maximum leaf area index (m²/m²) - controls canopy transpiration area
# ROOT: Root depth (m) - controls soil moisture access for transpiration
#   These three together control the ET partitioning. RSMIN alone hit ceiling at 796/800.
#
# ===== Snow/Ponding Parameters (hydrology.ini) =====
# ZSNL: Limiting snow depth (m) - below which coverage < 100%
# ZPLS: Maximum ponding depth on snow-covered areas (m)
# ZPLG: Maximum ponding depth on ground (m) - affects surface storage/runoff delay

