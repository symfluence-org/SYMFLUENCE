# MESH parameter bounds (CLASS.ini + hydrology.ini parameters)
# VERSION 10: 13 params — added LAMX + ROOT for ET control
#   - warm-start from run_19 (KGE=0.7454) for 11 shared params
#   - LAMX and ROOT start from CLASS.ini defaults (LAMX=2.0, ROOT=0.5)
MESH_PARAM_BOUNDS:
  # Soil/Infiltration (CLASS.ini)
  KSAT: [1.0, 50.0]                                            # Saturated hydraulic conductivity (mm/hr)
  DRN: [0.5, 4.0]                                              # Drainage parameter (-)
  SDEP: [0.5, 5.0]                                             # Soil depth (m)
  XSLP: [0.005, 0.15]                                          # Slope (-)
  XDRAINH: [0.05, 1.0]                                         # Horizontal drainage (-)
  # Snow/Ponding (hydrology.ini) - CRITICAL for alpine snowmelt timing
  ZSNL: [0.005, 0.08]                                          # Limiting snow depth (m)
  ZPLS: [0.005, 0.12]                                          # Max ponding depth on snow (m)
  ZPLG: [0.02, 0.40]                                           # Max ponding depth on ground (m)
  # Surface flow (CLASS.ini) - hydrograph shape
  MANN_CLASS: [0.03, 0.35]                                     # Manning overland flow (-)
  FRZTH: [0.1, 2.0]                                            # Frozen soil threshold (m)
  # ET control (CLASS.ini) - three levers for transpiration partitioning
  RSMIN: [100.0, 800.0]                                        # Minimum stomatal resistance (s/m) - run_19 optimal: 796
  LAMX: [0.5, 6.0]                                             # Maximum LAI (m²/m²) - current: 2.0, controls canopy area
  ROOT: [0.1, 2.0]                                             # Root depth (m) - current: 0.5, controls soil moisture access
MESH_FORCE_SINGLE_GRU: true  # Use multiple landcover-based GRUs

# Multi-GRU parameter distribution settings (new)
MESH_APPLY_PARAMS_ALL_GRUS: true   # Apply calibrated params to all landcover classes
MESH_USE_LANDCOVER_MULTIPLIERS: true  # Apply landcover-specific multipliers

# Landcover-specific parameter multipliers (optional - these are defaults)
# Keys are NALCMS class IDs, values are multipliers relative to calibrated values
# MESH_LANDCOVER_MULTIPLIERS:
#   1:   # Needleleaf forest
#     KSAT: 0.8         # Slower infiltration (root mat, organic layer)
#     SDEP: 1.2         # Deeper effective soil
#     MANN_CLASS: 1.5   # Rougher surface
#   8:   # Shrubland
#     KSAT: 1.0
#     SDEP: 1.0
#     MANN_CLASS: 1.2
#   10:  # Grassland
#     KSAT: 1.2         # Faster infiltration
#     SDEP: 0.9         # Shallower soil
#     MANN_CLASS: 0.8   # Smoother surface
#   16:  # Barren/Rock
#     KSAT: 1.5         # Fast infiltration (fractured rock)
#     SDEP: 0.5         # Minimal soil
#     MANN_CLASS: 0.6   # Smooth rock surface
