### ============================================= 6. Multivariate evaluation settings: ====================================================

# Enable multivariate evaluation
MULTIVAR_EVALUATION: True

# CALIBRATION TARGETS: Joint Streamflow + TWS (Multi-objective)
# Weighted combination: 50% streamflow KGE + 50% TWS correlation
# Combined objective = 0.5 * KGE + 0.5 * r_TWS
CALIBRATION_TARGETS:
  - variable: streamflow
    source: WSC
    station_id: 05BB001
    metric: KGE
    weight: 0.5
  - variable: TWS
    source: GRACE
    product: GRACE_JPL_RL06_mascon
    metric: correlation
    weight: 0.5

# EVALUATION TARGETS: All variables for post-hoc comparison
EVALUATION_TARGETS:
  - variable: TWS
    source: GRACE
    metric: correlation
  - variable: streamflow
    source: WSC
    metric: KGE
  - variable: SWE
    source: CanSWE
    metric: correlation
  - variable: ET
    source: SSEBop
    metric: correlation

# GRACE data settings
DOWNLOAD_GRACE: true
GRACE_PRODUCT: GRACE_JPL_RL06_mascon
GRACE_PATH: default
GRACE_TWS_PRODUCT: GRACE_JPL_RL06_mascon
GRACE_TWS_PATH: default
GRACE_TWS_VARIABLE: lwe_thickness
GRACE_ANOMALY_BASELINE: 2004-01-01, 2009-12-31

# TWS computation settings
TWS_COMPONENTS:
  - scalarSWE
  - scalarTotalSoilWat
  - scalarCanopyWat
  - scalarAquiferStorage
TWS_AQUIFER_SCALE: 1000  # Convert m to mm

# CanSWE in-situ SWE data settings
DOWNLOAD_CANSWE: true
CANSWE_VERSION: v6
CANSWE_MIN_OBSERVATIONS: 10
CANSWE_PATH: default

### ============================================= 7. Optimization settings: ===============================================================

OPTIMIZATION_METHODS: [iteration]

# Iterative optimization settings - MULTI-OBJECTIVE using NSGA-II
# Budget: 40 population × 50 generations = 2000 function evaluations
ITERATIVE_OPTIMIZATION_ALGORITHM: NSGA-II
NUMBER_OF_ITERATIONS: 50
POPULATION_SIZE: 40
SKIP_WARM_START: true

# NSGA-II multi-objective configuration (streamflow KGE + TWS correlation)
NSGA2_MULTI_TARGET: true
NSGA2_PRIMARY_TARGET: streamflow
NSGA2_SECONDARY_TARGET: TWS
NSGA2_PRIMARY_METRIC: KGE
NSGA2_SECONDARY_METRIC: correlation
NSGA2_CROSSOVER_RATE: 0.9
NSGA2_MUTATION_RATE: 0.1
NSGA2_ETA_C: 20
NSGA2_ETA_M: 20

# SUMMA parameter bounds - Using SUMMA defaults from localParamInfo.txt / basinParamInfo.txt
# Only override soil constraint parameters to prevent SUMMA crashes from physically
# impossible combinations (crit* > theta_sat).
PARAMETER_BOUNDS:
  critSoilWilting: [0.05, 0.3]     # Must be < theta_sat_min (0.35); SUMMA default [0, 1] causes crashes
  critSoilTranspire: [0.05, 0.3]   # Must be < theta_sat_min (0.35); SUMMA default [0, 1] causes crashes
