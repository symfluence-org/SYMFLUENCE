### ============================================= SYMFLUENCE configuration file ============================================================
# Iceland Large Domain Experiment - Section 4.9
# Using CARRA reanalysis forcing (3-hourly, 2.5km resolution)
# Full Iceland domain with distributed FUSE + mizuRoute routing
### ============================================= 1. Global settings: =====================================================================

# Main paths
SYMFLUENCE_DATA_DIR: "/Users/darrieythorsson/compHydro/code/SYMFLUENCE_data/"
SYMFLUENCE_CODE_DIR: "/Users/darrieythorsson/compHydro/code/SYMFLUENCE"

# Experiment settings
DOMAIN_NAME: Iceland_multivar
EXPERIMENT_ID: iceland_large_domain_carra
EXPERIMENT_TIME_START: 2000-01-01 03:00
EXPERIMENT_TIME_END: 2008-12-31 21:00
CALIBRATION_PERIOD: 2001-01-01, 2006-12-31
EVALUATION_PERIOD:  2007-01-01, 2008-12-31
SPINUP_PERIOD: 2000-01-01, 2000-12-31

# Data access settings
DATA_ACCESS: "cloud"
DEM_SOURCE: "copernicus"
DOWNLOAD_DEM: true
LAND_CLASS_SOURCE: "modis"
DOWNLOAD_LAND_COVER: true
DOWNLOAD_SOIL: true

# Computational settings
MPI_PROCESSES: 1
FORCE_RUN_ALL_STEPS: False

