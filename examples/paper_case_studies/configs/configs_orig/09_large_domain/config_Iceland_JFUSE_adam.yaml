### ============================================= SYMFLUENCE configuration file ============================================================
# Iceland Large Domain Experiment - JFUSE + Adam
# JAX-based FUSE with native autodiff gradient-based calibration
# Same domain/forcing as FUSE experiment, but using jFUSE model with Adam optimizer
### ============================================= 1. Global settings: =====================================================================

# Main paths
SYMFLUENCE_DATA_DIR: "/Users/darrieythorsson/compHydro/code/SYMFLUENCE_data/"
SYMFLUENCE_CODE_DIR: "/Users/darrieythorsson/compHydro/code/SYMFLUENCE"

# Experiment settings
DOMAIN_NAME: Iceland_multivar
EXPERIMENT_ID: iceland_large_domain_jfuse_adam
EXPERIMENT_TIME_START: 2000-01-01 03:00
EXPERIMENT_TIME_END: 2003-12-31 21:00
CALIBRATION_PERIOD: 2001-01-01, 2002-12-31
EVALUATION_PERIOD:  2003-01-01, 2003-12-31
SPINUP_PERIOD: 2000-01-01, 2000-12-31

# Data access settings
DATA_ACCESS: "cloud"
DEM_SOURCE: "copernicus"
DOWNLOAD_DEM: true
LAND_CLASS_SOURCE: "modis"
DOWNLOAD_LAND_COVER: true
DOWNLOAD_SOIL: true

# Computational settings
MPI_PROCESSES: 1
FORCE_RUN_ALL_STEPS: False

### ============================================= 2. Geospatial settings: =================================================================
# Coordinate settings (Iceland bounding box)
POUR_POINT_COORDS: 64.9631/-19.0208
BOUNDING_BOX_COORDS: 66.6/-24.6/63.3/-13.4

# Pour point shapefile path
POUR_POINT_SHP_PATH: default
POUR_POINT_SHP_NAME: default

# Domain representation settings
DOMAIN_DEFINITION_METHOD: delineate
ROUTING_DELINEATION: distributed

GEOFABRIC_TYPE: TDX
STREAM_THRESHOLD: 15000
LUMPED_WATERSHED_METHOD: TauDEM
CLEANUP_INTERMEDIATE_FILES: True
DELINEATE_BY_POURPOINT: False
MOVE_OUTLETS_MAX_DISTANCE: 200
MIN_GRU_SIZE: 1

# Coastal basin delineation settings
DELINEATE_COASTAL_WATERSHEDS: True

# Domain discretization settings
SUB_GRID_DISCRETIZATION: GRUS
ELEVATION_BAND_SIZE: 200
MIN_HRU_SIZE: 4
RADIATION_CLASS_NUMBER: 5
ASPECT_CLASS_NUMBER: 8
ASPECT_PATH: default

# Shapefile settings - Catchment shape
CATCHMENT_PATH: default
CATCHMENT_SHP_NAME: default
CATCHMENT_SHP_LAT: center_lat
CATCHMENT_SHP_LON: center_lon
CATCHMENT_SHP_AREA: HRU_area
CATCHMENT_SHP_HRUID: HRU_ID
CATCHMENT_SHP_GRUID: GRU_ID

# Shapefile settings - Basins shape
RIVER_BASINS_PATH: default
RIVER_BASINS_NAME: default
RIVER_BASIN_SHP_RM_GRUID: GRU_ID
RIVER_BASIN_SHP_HRU_TO_SEG: gru_to_seg
RIVER_BASIN_SHP_AREA: GRU_area

# Shapefile settings - River network shape
RIVER_NETWORK_SHP_PATH: default
RIVER_NETWORK_SHP_NAME: default
RIVER_NETWORK_SHP_LENGTH: Length
RIVER_NETWORK_SHP_SEGID: LINKNO
RIVER_NETWORK_SHP_DOWNSEGID: DSLINKNO
RIVER_NETWORK_SHP_SLOPE: Slope

# Geospatial data paths
OUTPUT_BASINS_PATH: default
OUTPUT_RIVERS_PATH: default
DEM_PATH: default
DEM_NAME: default
TAUDEM_DIR: default
OUTPUT_DIR: default
CATCHMENT_PLOT_DIR: default
SOIL_CLASS_PATH: default
SOIL_CLASS_NAME: default
LAND_CLASS_PATH: default
LAND_CLASS_NAME: default
RADIATION_PATH: default

# Tool paths
DATATOOL_PATH: default
GISTOOL_PATH: default
EASYMORE_CLIENT: easymore cli
DATATOOL_DATASET_ROOT: /work/comphyd_lab/data/meteorological-data/
DATATOOL_CACHE: /home/darri.eythorsson
TOOL_ACCOUNT: def-mclark
GISTOOL_DATASET_ROOT: /work/comphyd_lab/data/geospatial-data/
GISTOOL_LIB_PATH: /work/comphyd_lab/envs/r-env/
TOOL_CACHE: /home/darri.eythorsson/cache
EASYMORE_CACHE: /home/darri.eythorsson/easymore/
EASYMORE_JOB_CONF: "installs/MAF/02_model_agnostic_component/easymore-job.slurm"
CLUSTER_JSON: /work/comphyd_lab/users/darri/data/SYMFLUENCE_data/installs/datatool/etc/clusters/ucalgary-arc.json

### ============================================= 3. Model Agnostic settings: =============================================================

# Forcing data settings - CARRA is 3-hourly
FORCING_DATASET: CARRA
FORCING_VARIABLES: airtemp,pptrate,airpres,spechum,windspd,SWRadAtm,LWRadAtm
FORCING_MEASUREMENT_HEIGHT: 2
FORCING_TIME_STEP_SIZE: 10800
APPLY_LAPSE_RATE: True
LAPSE_RATE: 0.0065
FORCING_SHAPE_LAT_NAME: latitude
FORCING_SHAPE_LON_NAME: longitude
FORCING_PATH: default

# Raw CARRA forcing data (grid-level, before HRU remapping)
FORCING_RAW_PATH: "/Users/darrieythorsson/compHydro/code/SYMFLUENCE_data/domain_Iceland_multivar/forcing/raw_data"

# EM-Earth forcing supplementation settings
SUPPLEMENT_FORCING: False
EM_EARTH_PRCP_DIR: "/anvil/datasets/meteorological/EM-Earth/EM_Earth_v1/deterministic_hourly/prcp/NorthAmerica"
EM_EARTH_TMEAN_DIR: "/anvil/datasets/meteorological/EM-Earth/EM_Earth_v1/deterministic_hourly/tmean/NorthAmerica"

# Intersection paths
INTERSECT_SOIL_PATH: default
INTERSECT_SOIL_NAME: catchment_with_soilclass.shp
INTERSECT_ROUTING_PATH: default
INTERSECT_ROUTING_NAME: catchment_with_routing_basins.shp
INTERSECT_DEM_PATH: default
INTERSECT_DEM_NAME: catchment_with_dem.shp
INTERSECT_LAND_PATH: default
INTERSECT_LAND_NAME: catchment_with_landclass.shp

### ============================================= 4. Model Specific settings: =============================================================

# Model settings - JFUSE with mizuRoute routing
HYDROLOGICAL_MODEL: JFUSE
ROUTING_MODEL: mizuRoute

# JFUSE settings
JFUSE_MODEL_CONFIG_NAME: prms_gradient
JFUSE_SPATIAL_MODE: distributed
JFUSE_ENABLE_SNOW: True
JFUSE_ENABLE_ROUTING: False
JFUSE_JIT_COMPILE: True
JFUSE_USE_GPU: False
JFUSE_WARMUP_DAYS: 90
JFUSE_TIMESTEP_DAYS: 1.0
JFUSE_CALIBRATION_METRIC: KGE
JFUSE_USE_GRADIENT_CALIBRATION: True
JFUSE_NETWORK_FILE: /Users/darrieythorsson/compHydro/code/SYMFLUENCE_data/domain_Iceland_multivar/settings/mizuRoute/topology.nc
JFUSE_FORCING_SOURCE: FUSE_input
JFUSE_MAPPING_FILE: /Users/darrieythorsson/compHydro/code/SYMFLUENCE_data/domain_Iceland_multivar/settings/mizuRoute/fuse_to_routing_mapping.csv

# Transfer function settings — spatially varying parameters from catchment attributes
JFUSE_USE_TRANSFER_FUNCTIONS: true
JFUSE_ATTRIBUTES_PATH: /Users/darrieythorsson/compHydro/code/SYMFLUENCE_data/domain_Iceland_multivar/settings/FUSE/subcatchment_attributes.csv

# JFUSE parameters to calibrate (prms_gradient default 14 params, all with non-zero gradients)
JFUSE_PARAMS_TO_CALIBRATE: S1_max,S2_max,ku,ki,ks,n,Ac_max,b,f_rchr,T_rain,T_melt,MFMAX,MFMIN,smooth_frac

# mizuRoute settings (same as FUSE experiment)
SETTINGS_MIZU_WITHIN_BASIN: 0
SETTINGS_MIZU_ROUTING_DT: 3600
SETTINGS_MIZU_ROUTING_UNITS: m/s
SETTINGS_MIZU_ROUTING_VAR: q_routed
SETTINGS_MIZU_OUTPUT_FREQ: single
SETTINGS_MIZU_OUTPUT_VARS: 1
SETTINGS_MIZU_MAKE_OUTLET: n/a
SETTINGS_MIZU_NEEDS_REMAP: false
MIZU_FROM_MODEL: default
SETTINGS_MIZU_PATH: default
MIZUROUTE_INSTALL_PATH: default
MIZUROUTE_EXE: mizuRoute.exe
SETTINGS_MIZU_TOPOLOGY: topology.nc
SETTINGS_MIZU_PARAMETERS: param.nml.default
SETTINGS_MIZU_CONTROL_FILE: mizuroute.control
SETTINGS_MIZU_REMAP: routing_remap.nc

# Model results path
EXPERIMENT_OUTPUT_JFUSE: default
EXPERIMENT_LOG_JFUSE: default

### ============================================= 5. Evaluation settings: =================================================================

# Simulation settings
SIMULATIONS_PATH: default

# Observation data settings
OBSERVATIONS_PATH: default
DOWNLOAD_MODIS_SNOW: true
ADDITIONAL_OBSERVATIONS: MODIS_SNOW

### ============================================= 6. Multivariate evaluation - SCF Trend settings: ========================================

# Multivariate comparison settings
MULTIVAR_EVALUATION: True
MULTIVAR_TARGETS:
  - variable: SCF
    source: MODIS
    product: MOD10A2
    metric: trend_correlation
    weight: 1.0

# MODIS Snow Cover Fraction settings for trend study
MODIS_SCF_PRODUCT: MOD10A2
MODIS_SCF_PATH: default
MODIS_SCF_VARIABLE: Maximum_Snow_Extent
MODIS_SCF_TEMPORAL_RESOLUTION: 8day
MODIS_CLOUD_FILTER: True
MODIS_CLOUD_MAX_FRACTION: 0.3

# Trend analysis settings
SCF_TREND_ANALYSIS: True
SCF_TREND_METHOD: Mann-Kendall
SCF_TREND_SIGNIFICANCE: 0.05
SCF_TREND_PERIOD: 2000-03-01, 2003-12-31
SCF_SEASONAL_DECOMPOSITION: True
SCF_SEASONS:
  accumulation: [10, 11, 12, 1, 2, 3]
  ablation: [4, 5, 6]
  snow_free: [7, 8, 9]

# Regional aggregation settings
SCF_REGIONAL_AGGREGATION: True
SCF_ELEVATION_BANDS: [0, 200, 400, 600, 800, 1000, 1200, 1500, 2000]
SCF_SPATIAL_RESOLUTION: 500

### ============================================= 7. Optimization settings: ===============================================================

OPTIMIZATION_METHODS: [iteration]

# Multi-gauge calibration settings
MULTI_GAUGE_CALIBRATION: True
GAUGE_SEGMENT_MAPPING: /Users/darrieythorsson/compHydro/code/SYMFLUENCE_data/domain_Iceland_Multivar/settings/mizuRoute/gauge_segment_mapping.csv
MULTI_GAUGE_OBS_DIR: /Users/darrieythorsson/compHydro/data/lamah_ice/D_gauges/2_timeseries/daily
MULTI_GAUGE_AGGREGATION: median
MULTI_GAUGE_MIN_GAUGES: 5
MULTI_GAUGE_EXCLUDE_IDS: [82, 97, 39, 13, 76]
MULTI_GAUGE_MAX_DISTANCE: 0.1
MULTI_GAUGE_MIN_OBS_CV: 0.15
MULTI_GAUGE_MIN_SPECIFIC_Q: 400

# Adam optimization settings
SKIP_WARM_START: false
ITERATIVE_OPTIMIZATION_ALGORITHM: Adam
NUMBER_OF_ITERATIONS: 200
OPTIMIZATION_METRIC: KGE
TARGET_METRIC: KGE

# Adam hyperparameters
ADAM_LR: 0.003
ADAM_BETA1: 0.9
ADAM_BETA2: 0.999
ADAM_STEPS: 200
GRADIENT_MODE: auto
GRADIENT_CLIP_VALUE: 1000000.0
