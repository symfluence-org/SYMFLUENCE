  vegeParTbl:
  - MODIFIED_IGBP_MODIS_NOAH
  soilStress:
  - NoahType
  stomResist:
  - BallBerry
  LAI_method:
  - monTable
  veg_traits:
  - Raupach_BLM1994
  canopyEmis:
  - difTrans
  windPrfile:
  - logBelowCanopy
  canopySrad:
  - BeersLaw
  soilCatTbl:
  - ROSETTA
  f_Richards:
  - mixdform
  groundwatr:
  - bigBuckt
  hc_profile:
  - constant
  bcLowrSoiH:
  - drainage
  thCondSoil:
  - funcSoilWet
  spatial_gw:
  - localColumn
  subRouting:
  - timeDlay
  num_method:
  - itertive
  fDerivMeth:
  - analytic
  bcUpprTdyn:
  - nrg_flux
  bcLowrTdyn:
  - zeroFlux
  bcUpprSoiH:
  - liq_flux
  astability:
