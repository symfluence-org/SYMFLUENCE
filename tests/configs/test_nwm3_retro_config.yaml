# Observations (skip for this test)
EVALUATION_DATA:
- streamflow
ANALYSES:
- benchmarking
STREAMFLOW_DATA_PROVIDER: USGS
DOWNLOAD_USGS_DATA: true
STATION_ID: '06741510'
SIM_REACH_ID: 123

# Params (minimal set)
PARAMS_TO_CALIBRATE: tempCritRain,k_soil
BASIN_PARAMS_TO_CALIBRATE: routingGammaScale
CALIBRATION_TIMESTEP: daily
